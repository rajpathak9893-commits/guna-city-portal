{% extends "master.html" %}
{% block title %}Login{% endblock %}

{% block content %}

<style>
.auth-box {
    max-width: 450px;
    margin: 60px auto;
    background: #1e293b;
    padding: 50px;
    border-radius: 20px;
    text-align: left;
    box-shadow: 0px 0px 30px rgba(56,189,248,0.2);
}
.auth-box h1 { text-align: center; margin-bottom: 10px; color: #fff; }
.auth-box p  { text-align: center; color: #cbd5e1; margin-bottom: 35px; }

.auth-box label {
    display: block;
    margin-bottom: 6px;
    margin-top: 15px;
    color: #94a3b8;
    font-size: 13px;
    font-weight: 600;
}
.auth-box input {
    width: 100%;
    padding: 13px 15px;
    border: 1.5px solid #334155;
    border-radius: 10px;
    background: #0f172a;
    color: white;
    outline: none;
    transition: border-color 0.2s;
    font-size: 14px;
}
.auth-box input:focus { border-color: #38bdf8; }

/* ── Error messages ── */
.error-box {
    background: rgba(220,38,38,0.1);
    border: 1px solid rgba(220,38,38,0.4);
    color: #fca5a5;
    padding: 12px 16px;
    border-radius: 10px;
    margin-bottom: 18px;
    font-size: 13px;
}
.error-box ul { margin: 0; padding-left: 18px; }

.auth-btn {
    width: 100%;
    margin-top: 25px;
    padding: 15px;
    border: none;
    border-radius: 12px;
    background: #38bdf8;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    transition: 0.3s;
    color: #0f172a;
}
.auth-btn:hover { background: #7dd3fc; }

.bottom-text {
    text-align: center;
    margin-top: 20px;
    color: #cbd5e1;
    font-size: 14px;
}
.bottom-text a { color: #38bdf8; text-decoration: none; font-weight: 600; }
</style>

<section>
<div class="auth-box">
    <h1>Login</h1>
    <p>Welcome back to ApnaGuna Pro</p>

    {% if form.errors %}
    <div class="error-box">
        ❌ Username ya Password galat hai. Dobara try karo.
    </div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <label>Username</label>
        <input type="text" name="username"
               value="{{ form.data.username }}"
               placeholder="Apna username daalo" required>

        <label>Password</label>
        <input type="password" name="password"
               placeholder="Apna password daalo" required>

        <button class="auth-btn">🔐 Login</button>
    </form>

    <div class="bottom-text">
        Account nahi hai?
        <a href="/accounts/register/">Register karo</a>
    </div>
</div>
</section>

{% endblock %}
